<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QLD Fuel Finder</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search suburb or station..." />
      <select id="fuel-select">
        <option value="E10">E10</option>
        <option value="91" selected>91</option>
        <option value="95">95</option>
        <option value="98">98</option>
        <option value="DSL">Diesel</option>
      </select>

    </div>
  </header>

  <main>
    <div id="map" class="map"></div>
    <ul id="list" class="hidden"></ul>
    <button id="recenter-btn" title="Recenter map">📍</button>
  </main>

  <footer>
    <button id="map-tab" class="tab active">🗺️ Map</button>
    <button id="list-tab" class="tab">📋 List</button>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js" crossorigin=""></script>
  <script src="script.js"></script>

  <div id="bottom-tabs">
  <button id="tab-map" class="tab active">
    <img src="https://fontawesome.com/icons/map?f=classic&s=solid" alt="Map">
    <span>Map</span>
  </button>
  <button id="tab-list" class="tab">
    <img src="https://fontawesome.com/icons/rectangle-list?f=classic&s=regular" alt="List">
    <span>List</span>
  </button>
</div>
</body>
</html>
