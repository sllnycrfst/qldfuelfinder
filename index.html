<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QLD Fuel Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- Roboto & ZCOOL font -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.ico">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }
  </style>
</head>
<body>
  <header>
    <div class="top-bar">
      <input type="text" id="search" placeholder="Search QLD suburb…" />
      <div class="right-controls">
        <select id="fuel-select">
          <option value="91">ULP 91</option>
          <option value="95">PULP 95</option>
          <option value="98">PULP 98</option>
          <option value="E10">E10</option>
          <option value="Diesel">Diesel</option>
        </select>
        <i class="fa-solid fa-gas-pump" style="margin-left:8px;color:#0072ff;"></i>
      </div>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <button id="recenter-btn" title="Go to my location">
      <i class="fa-solid fa-location-crosshairs"></i>
    </button>
    <ul id="list" class="hidden"></ul>
    <nav id="bottom-tabs">
      <button class="tab active" id="map-tab" title="Map"><i class="fa-solid fa-map"></i></button>
      <button class="tab" id="list-tab" title="List"><i class="fa-solid fa-rectangle-list"></i></button>
    </nav>
    <div class="fuel-price-demo" style="display:none">
      <span class="fuel-price">$1.879</span>
      <span style="font-size:1em;color:#888;">(ULP 91)</span>
    </div>
  </main>
  <!-- Load Leaflet JS at end of body -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
