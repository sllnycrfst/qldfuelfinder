<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuel Watch QLD</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Apple MapKit JS -->
  <script src="https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.js"></script>
  <style>
    #apple-map {
      width: 100vw;
      height: 100vh;
      min-height: 320px;
      border-radius: 0;
      z-index: 1;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; /* disables all map interaction */
    }
    body { margin: 0; }
  </style>
</head>

<body>
  <!-- Apple Map -->
  <div id="apple-map"></div>

  <!-- Glassy Floating Buttons -->
  <button class="glassy-btn" id="search-btn" title="Search"><i class="fas fa-search"></i></button>
  <button class="glassy-btn" id="filter-btn" title="Filters"><i class="fas fa-sliders-h"></i></button>
  <button class="glassy-btn" id="list-btn" title="List"><i class="fas fa-bars"></i></button>

  <!-- Search Panel Overlay & Panel -->
  <div class="panel-overlay" id="search-overlay"></div>
  <div class="sliding-panel" id="search-panel">
    <div class="panel-drag-bar"></div>
    <div class="panel-content">
      <div class="search-bar-panel">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Search suburb or postcode..." autocomplete="off" />
      </div>
      <ul class="suburb-list" id="suburb-list"></ul>
    </div>
  </div>

  <!-- Filters Panel Overlay & Panel -->
  <div class="panel-overlay" id="filter-overlay"></div>
  <div class="sliding-panel" id="filter-panel">
    <div class="panel-drag-bar"></div>
    <div class="panel-content">
      <div class="fuel-types-list" id="fuel-type-list"></div>
    </div>
  </div>

  <!-- List Panel Overlay & Panel -->
  <div class="panel-overlay" id="list-overlay"></div>
  <div class="sliding-panel" id="list-panel">
    <div class="panel-drag-bar"></div>
    <div class="panel-content">
      <div class="list-content-wrapper" style="height:100%;min-height:0;display:flex;flex-direction:column;">
        <ul id="list" style="flex:1 1 auto;min-height:0;height:100%;"></ul>
      </div>
    </div>
  </div>

  <!-- Feature Card Panel Overlay & Panel (hidden by default, shown on list/map marker click) -->
  <div class="panel-overlay" id="feature-overlay"></div>
  <div class="sliding-panel" id="feature-panel">
    <div class="panel-drag-bar"></div>
    <div class="panel-content" id="feature-card-content">
      <!-- Populated by JS with station details -->
    </div>
  </div>

  <!-- Side Controls -->
  <div class="side-controls">
    <div class="custom-zoom-rect">
      <button id="zoom-in">+</button>
      <div class="zoom-divider"></div>
      <button id="zoom-out">−</button>
    </div>
  </div>

  <!-- Apple MapKit JS Init Script -->
  <script>
    mapkit.init({
      authorizationCallback: function(done) {
        done("eyJraWQiOiJHRzdDODlGSlQ5IiwidHlwIjoiSldUIiwiYWxnIjoiRVMyNTYifQ.eyJpc3MiOiJDUzNISEM3NjJaIiwiaWF0IjoxNzUyNzE2NDEyLCJleHAiOjE3NTMzNDAzOTl9.kR2EAjIdFvID72QaCY2zMFIAp7jJqhUit4w0s6z5P67WEvTcDw6wlbF8fbtOcRHwzIYvyQL15zaZRGbADLJ16g");
      }
    });

    // Replace with your desired initial location and zoom (Brisbane example)
    const map = new mapkit.Map("apple-map", {
      center: new mapkit.Coordinate(-27.4698, 153.0251), // Brisbane
      showsCompass: false,
      showsScale: false,
      showsMapTypeControl: false,
      showsZoomControl: false,
      showsUserLocationControl: false
    });
  </script>
</body>
</html>
