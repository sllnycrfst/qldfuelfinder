<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QLD Fuel Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- Roboto & Quantico font -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>
  <header>
    <div class="top-bar">
      <input type="text" id="search" placeholder="Search by Postcode or Suburb" />
      <div class="right-controls">
        <select id="fuel-select">
          <option value="E10">E10</option>
          <option value="91">Unleaded 91</option>
          <option value="95">Premium 95</option>
          <option value="98">Premium 98</option>
          <option value="Diesel">Diesel</option>
          <option value="Premium Diesel">Premium Diesel</option>
        </select>
      </div>
    </div>
  </header>
  <main>
    <div id="tabs">
      <button id="map-tab" class="active">Map</button>
      <button id="list-tab">List</button>
    </div>
    <div id="map"></div>
    <button id="recenter-btn" title="Go to my location">
      <i class="fa-solid fa-location-crosshairs"></i>
    </button>
    <ul id="list" class="hidden"></ul>
  </main>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="script.js"></script>
</body>
</html>
