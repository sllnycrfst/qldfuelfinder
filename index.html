<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QLD Fuel Watch</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAQ0Ba7zICGUy5zCVijkkDNrNVdKAG1FGU&libraries=geometry&map_ids=DEMO_MAP_ID"></script>
</head>

<body>
<div id="google-map" style="width: 100vw; height: 100vh;"></div>

<!-- Map Controls Wrapper -->
<div class="map-controls-wrapper">
  <!-- Custom Map Controls -->
  <div class="custom-map-controls">
    <!-- Fuel Selector (moved to top) -->
    <div class="fuel-selector">
      <div class="fuel-dropdown">
        <button class="fuel-dropdown-btn" id="fuel-dropdown-btn">Unleaded E10 <span class="arrow">▼</span></button>
        <div class="fuel-dropdown-content" id="fuel-dropdown-content">
          <!-- Populated by JavaScript -->
        </div>
      </div>
    </div>

    <!-- Map Type Control (moved to bottom) -->
    <div class="custom-maptype-control">
      <button class="maptype-btn" id="maptype-btn">
        <i class="fas fa-layer-group"></i>
      </button>
      <div class="maptype-dropdown" id="maptype-dropdown">
        <div class="maptype-item" onclick="changeMapType('roadmap')"><i class="fas fa-road"></i> Map</div>
        <div class="maptype-item" onclick="changeMapType('satellite')"><i class="fas fa-satellite"></i> Satellite</div>
        <div class="maptype-item" onclick="changeMapType('hybrid')"><i class="fas fa-globe"></i> Hybrid</div>
        <div class="maptype-item" onclick="changeMapType('terrain')"><i class="fas fa-mountain"></i> Terrain</div>
      </div>
    </div>
  </div>
</div>

<!-- Zoom Controls (separate) -->
<div class="zoom-controls-container">
  <div class="custom-zoom-control">
    <button class="zoom-in-btn" onclick="zoomIn()">
      <i class="fas fa-plus"></i>
    </button>
    <button class="zoom-out-btn" onclick="zoomOut()">
      <i class="fas fa-minus"></i>
    </button>
  </div>
</div>
        
<!-- Weather Display -->
<div class="weather-display" id="weather-display">
  <span class="weather-icon" id="weather-icon">☀️</span>
  <span class="weather-temp" id="weather-temp">--°</span>
</div>

<!--Bottom Toolbar-->
<div class="sc-bottom-bar">
  <a class="sc-menu-item" id="toolbar-search-btn">
    <i class="fas fa-search"></i>
  </a>
  <a class="sc-menu-item" id="toolbar-list-btn">
    <i class="fas fa-list"></i>
  </a>
</div>

<!-- Center Floating Action Button -->
<button class="sc-center-btn" id="toolbar-center-btn">
  <i class="fa-solid fa-location-arrow"></i>
</button>

<!-- Search Panel -->
<div class="panel-overlay" id="search-overlay"></div>
<div class="sliding-panel" id="search-panel">
  <div class="panel-drag-bar"></div>
  <div class="panel-content">
    <h3 class="panel-title">Search</h3>
    <div class="search-bar-panel">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="Search by suburb" />
    </div>
    <ul id="suburb-list" class="suburb-list"></ul>
  </div>
</div>

<!-- List Panel -->
<div class="panel-overlay" id="list-overlay"></div>
<div class="sliding-panel" id="list-panel">
  <div class="panel-drag-bar"></div>
  <div class="panel-content">
    <h3 class="panel-title">Nearby Stations</h3>
    <div class="list-content-wrapper" style="height:100%;min-height:0;display:flex;flex-direction:column;">
      <ul id="list" style="flex:1 1 auto;min-height:0;height:100%;"></ul>
    </div>
  </div>
</div>

<!-- Feature Card Panel -->
<div class="panel-overlay" id="feature-overlay"></div>
<div class="sliding-panel" id="feature-panel">
  <div class="panel-drag-bar"></div>
  <div class="panel-content" id="feature-card-content">
    <!-- Populated by JS with station details -->
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
