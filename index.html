<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QLD Fuel Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- Roboto & Teko fonts -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Teko:700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="top-bar">
      <input type="text" id="search" placeholder="Search QLD suburb…" />
      <div class="right-controls">
        <select id="fuel-select">
          <option value="91">&#128657; ULP 91</option>
          <option value="95">&#128657; PULP 95</option>
          <option value="98">&#128657; PULP 98</option>
          <option value="E10">&#128657; E10</option>
          <option value="Diesel">&#128657; Diesel</option>
        </select>
      </div>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <button id="recenter-btn" title="Go to my location">
      <img src="hairpin.svg" alt="My location" />
    </button>
    <ul id="list" class="hidden"></ul>
    <nav id="bottom-tabs">
      <button class="tab active" id="map-tab"><img src="map.svg" alt="Map" /></button>
      <button class="tab" id="list-tab"><img src="list.svg" alt="List" /></button>
    </nav>
  </main>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="script.js"></script>
</body>
</html>
