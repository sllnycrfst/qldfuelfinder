<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QLD Fuel Finder</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
    integrity="sha512-sA+z0pib+6jz1Fv8sEx+T82zJ42PZokN9YFJ6zV+3gBt9q9WYaWVnncw5u7Pr2XQF3zefNktz9c5N+Z5jQnS+g=="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>QLD Fuel Finder</h1>
    <div id="fuel-buttons">
      <button data-fuel="E10">E10</button>
      <button data-fuel="91">91</button>
      <button data-fuel="95">95</button>
      <button data-fuel="98">98</button>
      <button data-fuel="Diesel">Diesel</button>
    </div>
    <div id="view-tabs">
      <button id="map-tab">Map</button>
      <button id="list-tab">List</button>
    </div>
  </header>

  <main>
    <div id="map" style="height: 80vh;"></div>
    <ul id="list" class="hidden"></ul>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
    integrity="sha512-o8xGCzXyR5KUMM3C9Jp5qZc8t4MaA3ZQ+6WR7Z5Sw4kxoymeuC3Z5+pEhH4cbfU8cyGfyKjF8zO9AA5C9yS2ag=="
    crossorigin=""
  ></script>
  <script src="script.js"></script>
</body>
</html>
