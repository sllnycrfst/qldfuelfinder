<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QLD Fuel Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>
  <!-- Floating controls -->
  <div id="map-controls">
    <input type="text" id="search" placeholder="Search suburb or station..." autocomplete="off" />
    <select id="fuel-select">
      <option value="E10">E10</option>
      <option value="91">Unleaded 91</option>
      <option value="95">Premium 95</option>
      <option value="98">Premium 98</option>
    </select>
  </div>

  <div id="map"></div>

  <button id="list-btn" title="Show station list" class="list-btn glass-btn">☰</button>
  <button id="recenter-btn" title="Go to my location" class="recenter-btn glass-btn">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none" style="display:block" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="13" r="7" stroke="#387cc2" stroke-width="2"/>
      <line x1="13" y1="3" x2="13" y2="7" stroke="#387cc2" stroke-width="2"/>
      <line x1="13" y1="19" x2="13" y2="23" stroke="#387cc2" stroke-width="2"/>
      <line x1="3" y1="13" x2="7" y2="13" stroke="#387cc2" stroke-width="2"/>
      <line x1="19" y1="13" x2="23" y2="13" stroke="#387cc2" stroke-width="2"/>
    </svg>
  </button>

  <!-- Slide-up list panel -->
  <div id="list-panel" class="hidden">
    <button id="close-list-btn" title="Close list">&times;</button>
    <ul id="list"></ul>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
