<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QLD Fuel Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- Roboto & ZCOOL font -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.ico">
  <!-- Add to index.html head -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
</head>
<body>
  <header>
    <div class="top-bar">
      <input type="text" id="search" placeholder="Search by Postcode" />
      <div class="right-controls">
        <select id="fuel-select">
          <option value="E10">E10</option>
          <option value="91">Unleaded 91</option>
          <option value="95">Premium 95</option>
          <option value="98">Premium 98</option>
          <option value="Diesel">Diesel</option>
          <option value="Premium Diesel">Premium Diesel</option>
        </select>
      </div>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <button id="recenter-btn" title="Go to my location">
      <i class="fa-solid fa-location-crosshairs"></i>
    </button>

    <!-- Floating list button -->
    <button id="openFeatureBtn" title="Show Stations">
      <img src="list-icon.svg" alt="Show Stations" />
    </button>

    <!-- Slide-up feature panel -->
    <div id="featurePanel">
      <div id="cheapestCard" class="feature-card"></div>
      <div id="stationListContainer" class="station-list"></div>
    </div>
  </main>

  <!-- Load Leaflet JS at end of body -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
