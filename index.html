<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QLD Fuel Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>
  <!-- Floating controls -->
  <div id="map-controls">
    <input type="text" id="search" placeholder="Search suburb or station..." autocomplete="off" />
    <select id="fuel-select">
      <option value="E10">E10</option>
      <option value="91">Unleaded 91</option>
      <option value="95">Premium 95</option>
      <option value="98">Premium 98</option>
      <option value="Diesel">Diesel</option>
      <option value="Premium Diesel">Premium Diesel</option>
    </select>
  </div>

  <div id="map"></div>

  <div class="bottom-left-controls">
    <button id="recenter-btn" title="Go to my location">📍</button>
    <button id="list-btn" title="Show station list">☰</button>
  </div>

  <!-- Slide-up list panel -->
  <div id="list-panel" class="hidden">
    <button id="close-list-btn" title="Close list">&times;</button>
    <ul id="list"></ul>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
