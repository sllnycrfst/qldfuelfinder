<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QLD Fuel Finder</title>
  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
/>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>QLD Fuel Finder</h1>
    <div id="fuel-buttons">
      <button data-fuel="E10">E10</button>
      <button data-fuel="91">91</button>
      <button data-fuel="95">95</button>
      <button data-fuel="98">98</button>
      <button data-fuel="Diesel">Diesel</button>
    </div>
    <!-- Search Bar + Fuel Type Selector -->
<div id="search-bar">
  <input type="text" id="search-input" placeholder="Search suburb or station...">
  <select id="fuel-select">
    <option value="E10">E10</option>
    <option value="91">91</option>
    <option value="95">95</option>
    <option value="98">98</option>
    <option value="Diesel">Diesel</option>
  </select>
</div>

<!-- Map and List Containers -->
<div id="map" class="tab-view"></div>
<ul id="list" class="tab-view hidden"></ul>

<!-- Floating Target Button -->
<button id="recenter-btn">📍</button>

<!-- Fixed Bottom Tabs -->
<div id="view-tabs">
  <button id="map-tab">🗺️</button>
  <button id="list-tab">📄</button>
</div>

    <div id="view-tabs">
      <button id="map-tab">Map</button>
      <button id="list-tab">List</button>
    </div>
  </header>

  <main>
    <div id="map" style="height: 80vh;"></div>
    <ul id="list" class="hidden"></ul>
  </main>

  <script
  src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
></script>
  <script src="script.js"></script>
</body>
</html>
