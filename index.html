<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QLD Fuel Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>
  <!-- Map Controls / Search Bar -->
  <div class="search-bar-glass">
    <!-- Magnifying glass icon -->
    <span class="search-icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="9" cy="9" r="7" stroke="#387cc2" stroke-width="2"/>
        <line x1="15.2" y1="15.2" x2="12.4" y2="12.4" stroke="#387cc2" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </span>
    <input id="search" type="text" placeholder="Search suburb or postcode" autocomplete="on" />
    <span class="divider">|</span>
    <!-- Fuel bowser (pump) icon -->
    <span class="fuel-icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="3" y="3" width="8" height="12" rx="2" stroke="#387cc2" stroke-width="2"/>
        <rect x="6" y="6" width="2" height="2" fill="#387cc2"/>
        <path d="M11 6V5.5C11 4.67157 11.6716 4 12.5 4C13.3284 4 14 4.67157 14 5.5V8.5C14 9.32843 13.3284 10 12.5 10C11.6716 10 11 9.32843 11 8.5V8" stroke="#387cc2" stroke-width="1.3"/>
        <path d="M14 5.5L15.5 7" stroke="#387cc2" stroke-width="1.3"/>
      </svg>
    </span>
    <select id="fuel-select">
      <option value="E10">E10</option>
      <option value="91">91</option>
      <option value="95">95</option>
      <option value="98">98</option>
      <option value="Diesel">Diesel</option>
      <option value="Premium Diesel">Premium Diesel</option>
    </select>
  </div>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Floating Action Buttons -->
  <button id="list-btn" title="Show station list" class="list-btn glass-btn" aria-label="Show station list">
    <span aria-hidden="true">☰</span>
  </button>
  <button id="recenter-btn" title="Go to my location" class="recenter-btn glass-btn" aria-label="Go to my location">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none" style="display:block" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="13" r="7" stroke="#387cc2" stroke-width="2"/>
      <line x1="13" y1="3" x2="13" y2="7" stroke="#387cc2" stroke-width="2"/>
      <line x1="13" y1="19" x2="13" y2="23" stroke="#387cc2" stroke-width="2"/>
      <line x1="3" y1="13" x2="7" y2="13" stroke="#387cc2" stroke-width="2"/>
      <line x1="19" y1="13" x2="23" y2="13" stroke="#387cc2" stroke-width="2"/>
    </svg>
  </button>

  <!-- Slide-up List Panel -->
  <div id="list-panel" class="hidden" aria-modal="true" role="dialog">
    <button id="close-list-btn" title="Close list" aria-label="Close list">&times;</button>
    <ul id="list"></ul>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
