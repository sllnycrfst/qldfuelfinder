<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuel Watch QLD</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Map -->
  <div id="map"></div>

  <!-- Search Bar -->
  <div class="search-bar-glass">
    <div class="search-container">
      <div class="search-input-section">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search" placeholder="Search location..." />
      </div>
      <div class="fuel-divider"></div>
      <div class="fuel-selector-inline">
        <i class="fas fa-gas-pump fuel-icon"></i>
        <select id="fuel-select">
          <option value="E10">E10</option>
          <option value="91">91</option>
          <option value="95">95</option>
          <option value="98">98</option>
          <option value="Diesel/Premium Diesel">DSL</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Side Controls -->
  <div class="side-controls">
    <div class="custom-zoom-rect">
      <button id="zoom-in">+</button>
      <div class="zoom-divider"></div>
      <button id="zoom-out">−</button>
    </div>
  </div>

  <!-- Bottom Feature Card -->
  <div class="bottom-feature-card" id="bottom-feature-card">
    <div class="feature-card-drag-bar">
      <div class="drag-handle"></div>
    </div>
  </div>

  <!-- Bottom Toolbar -->
  <div class="bottom-toolbar">
    <button class="toolbar-side-btn" id="home-tab">
      <i class="fa-solid fa-chart-simple"></i>
    </button>
    <button class="toolbar-center-btn map-view" id="map-tab">
      <i class="fas fa-map"></i>
    </button>
    <button class="toolbar-side-btn" id="list-tab">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>

  <!-- Home Panel (Empty) -->
  <div class="fullscreen-panel hidden" id="home-panel">
    <div class="panel-content"></div>
  </div>

  
  <!-- List Panel (No heading) -->
  <div class="fullscreen-panel hidden" id="list-panel">
    <div class="panel-content">
      <div class="list-content-wrapper" style="height:100%;min-height:0;display:flex;flex-direction:column;">
        <ul id="list" style="flex:1 1 auto;min-height:0;height:100%;"></ul>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
